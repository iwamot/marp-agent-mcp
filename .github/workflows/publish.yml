name: Publish Docker images

on:
  push:
    tags:
      - "v*.*.*"

permissions: {}

jobs:
  publish:
    uses: iwamot/workflows/.github/workflows/publish-ecr-public.yml@1b26eebc34691108a09f9270c9539e03bcabdd4e # v4.0.1
    permissions:
      contents: read
      id-token: write  # to mint OIDC token for AWS role assumption
    with:
      registry_image: public.ecr.aws/k7d3h0b5/iwamot/marp-agent-mcp
    secrets:
      aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
