name: Publish Docker images

on:
  push:
    tags:
      - "v*.*.*"

permissions: {}

jobs:
  publish:
    uses: iwamot/workflows/.github/workflows/publish-ecr-public.yml@3fea0df39d8fefbf8eebd385aac85cd09a3faa57 # v3.3.0
    permissions:
      contents: read
      id-token: write  # to mint OIDC token for AWS role assumption
    with:
      registry_image: public.ecr.aws/k7d3h0b5/iwamot/marp-agent-mcp
    secrets:
      aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
