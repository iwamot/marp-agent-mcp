name: Publish Docker images

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  publish:
    uses: iwamot/workflows/.github/workflows/publish-ecr-public.yml@471bb812947616108999accbca3065012b71d221 # v1.1.0
    permissions:
      contents: read
      id-token: write
    with:
      registry_image: public.ecr.aws/k7d3h0b5/iwamot/marp-agent-mcp
    secrets:
      aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
