name: Publish Docker images

on:
  push:
    tags:
      - "v*.*.*"

permissions: {}

jobs:
  publish:
    uses: iwamot/workflows/.github/workflows/publish-ecr-public.yml@a3df0ee199d39e311c6b5553a176a3b352b90af8 # v1.5.0
    permissions:
      contents: read
      id-token: write  # to mint OIDC token for AWS role assumption
    with:
      registry_image: public.ecr.aws/k7d3h0b5/iwamot/marp-agent-mcp
    secrets:
      aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
