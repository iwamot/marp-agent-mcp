min_version = "2026.4.17"

[settings]
install_before = "1d"

[tools]
# aqua バックエンド (GitHub Releases) で取得。
# npm だとネイティブ binary tarball (@biomejs/cli-* 約30MB) の fetch が
# CI で失敗しやすいため。
biome = "2.4.13"
bun = "1.3.13"
node = "24.15.0"
"npm:@endevco/aube" = "1.5.0"
"npm:@marp-team/marp-cli" = "4.3.1"

[tools."npm:pnpm-override-prune"]
version = "0.0.6"
install_before = "0d"

[task_config]
includes = [
  "git::https://github.com/iwamot/mise-tasks.git//.mise/tasks?ref=v1.6.0",
]
