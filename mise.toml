min_version = "2026.6.3"

[settings]
npm.package_manager = "aube"

[env]
AUBE_ALLOWED_UNPOPULAR_PACKAGES = "pnpm-override-prune"
AUBE_TRUST_POLICY_EXCLUDE = "nanoid@3.3.14"

[tools]
biome = "2.4.13"
bun = "1.3.14"
node = "24.18.0"
"aqua:jdx/aube" = "1.25.2"
"npm:@marp-team/marp-cli" = "4.4.1"

[tools."npm:pnpm-override-prune"]
version = "0.0.7"
minimum_release_age = "0d"

[task_config]
includes = [
  "git::https://github.com/iwamot/mise-tasks.git//.mise/tasks?ref=v2.5.0",
]
