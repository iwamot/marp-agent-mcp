<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>Marp Slide Preview</title>
</head>
<body>
  <main class="main">
    <div class="toolbar">
      <div class="toolbar-row">
        <div class="toolbar-group">
          <select id="themeSelect" disabled></select>
        </div>
        <div class="toolbar-group">
          <button type="button" id="firstBtn" disabled>&lt;&lt;</button>
          <button type="button" id="prevBtn" disabled>&lt;</button>
          <button type="button" id="nextBtn" disabled>&gt;</button>
          <button type="button" id="lastBtn" disabled>&gt;&gt;</button>
        </div>
      </div>
      <div class="toolbar-row">
        <div class="toolbar-group">
          <select id="downloadFormat" disabled>
            <option value="pdf">PDF</option>
            <option value="pptx">PPTX</option>
            <option value="pptx-editable">Editable PPTX</option>
            <option value="md">Markdown</option>
          </select>
          <button type="button" id="downloadBtn" disabled>Download</button>
        </div>
      </div>
    </div>
    <div id="previewContainer">
      <style id="slideStyle"></style>
      <div class="marpit"></div>
    </div>
  </main>
  <script type="module" src="/src/mcp-app.ts"></script>
</body>
</html>
